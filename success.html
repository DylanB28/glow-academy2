<!doctype html><html lang="en-GB"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Membership Confirmation | Gem Glow Academy</title><meta name="robots" content="noindex,nofollow">
<link rel="icon" href="assets/favicon-32.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><link rel="stylesheet" href="css/app.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="assets/supabase-config.js"></script><script src="assets/js/auth.js"></script>
</head><body class="app-page"><main class="auth-shell"><section class="app-card" style="width:min(700px,92vw);text-align:center;padding:46px"><img src="assets/logo-96.png" alt="Gem Glow Academy" width="88" height="88"><p class="app-eyebrow" style="margin-top:16px">Secure membership activation</p><h1 class="app-title" style="font-size:48px">Welcome to Gem Glow</h1><p id="intro" class="app-subtitle" style="margin:0 auto 25px">We are confirming your payment and preparing your parent account.</p><div id="statusBox" class="banner warn"><i class="fa-solid fa-spinner fa-spin"></i> Confirming membership…</div><div class="app-actions" style="justify-content:center"><button id="retryBtn" class="app-button secondary" type="button" style="display:none"><i class="fa-solid fa-rotate"></i> Check again</button><a id="profileBtn" class="app-button primary" href="profile.html?welcome=1" style="display:none"><i class="fa-solid fa-child-reaching"></i> Create child profile</a></div><p class="app-help" style="margin-top:20px">You will never be given access unless Stripe and your Gem Glow account both confirm the membership.</p></section></main><script>
const statusBox=document.getElementById('statusBox'),retryBtn=document.getElementById('retryBtn'),profileBtn=document.getElementById('profileBtn');
function state(text,type='warn',icon='fa-spinner fa-spin'){statusBox.className=`banner ${type}`;statusBox.innerHTML=`<i class="fa-solid ${icon}"></i> ${text}`}
async function verify(){retryBtn.style.display='none';profileBtn.style.display='none';state('Confirming membership…');const {data}=await sb.auth.getSession();if(!data.session){state('Please sign in with the parent account used at checkout.','error','fa-triangle-exclamation');retryBtn.style.display='inline-flex';retryBtn.textContent='Go to parent sign in';retryBtn.onclick=()=>location.href='sign-in.html';return}const id=new URLSearchParams(location.search).get('session_id');if(!id){state('The checkout confirmation code is missing. Open your parent account to check membership.','error','fa-triangle-exclamation');retryBtn.style.display='inline-flex';retryBtn.onclick=()=>location.href='profile.html';return}try{const result=await ggaFetchJson(`/api/get-session?session_id=${encodeURIComponent(id)}`,{method:'GET',headers:{Authorization:`Bearer ${data.session.access_token}`}});if(result.active){document.getElementById('intro').textContent=`Your membership is active${result.customerName?`, ${String(result.customerName).split(' ')[0]}`:''}. Now create a secure profile for your child.`;state('Membership active. Your family account is ready.','good','fa-circle-check');profileBtn.style.display='inline-flex';setTimeout(()=>location.href='profile.html?welcome=1',1800);return}throw new Error('Membership is not active yet.')}catch(error){state(error.message||'We could not confirm membership yet. No access has been granted.','error','fa-triangle-exclamation');retryBtn.style.display='inline-flex';retryBtn.innerHTML='<i class="fa-solid fa-rotate"></i> Check again';retryBtn.onclick=verify}}
retryBtn.onclick=verify;verify();
</script></body></html>
